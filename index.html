<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <!-- theme-color drives the iOS standalone status-bar tint. No media
       attribute: JS manages the value at runtime based on the user's
       theme pref (which may diverge from the OS pref). -->
  <meta name="theme-color" content="#0C0C0C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scout" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Scout</title>
  <script>
    // Pre-paint: set data-theme + theme-color before React mounts so the
    // safe-area bars and status bar never flash the wrong color.
    (function(){
      try {
        var pref = localStorage.getItem('scout-theme-pref') || 'system';
        var dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = dark ? '#0C0C0C' : '#FFFDFA';
      } catch(e){}
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Default (light): paper. Dark devices: ink — matches what the React
       app paints once it mounts, so the safe-area top/bottom bars never
       flash white over the dark UI. */
    html, body, #root { height: 100%; width: 100%; overflow-x: hidden; background: #FFFDFA; }
    html[data-theme="dark"], html[data-theme="dark"] body, html[data-theme="dark"] #root { background: #0C0C0C; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
