<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <!-- theme-color drives the iOS standalone status-bar tint. Two entries —
       light first, dark via prefers-color-scheme — so dark-mode users don't
       see paper bars flashing on launch before JS swaps the color. JS at
       runtime can still override based on user theme pref / current screen. -->
  <meta name="theme-color" content="#FFFDFA" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0C0C0C" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scout" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Default (light): paper. Dark devices: ink — matches what the React
       app paints once it mounts, so the safe-area top/bottom bars never
       flash white over the dark UI. */
    html, body, #root { height: 100%; width: 100%; overflow-x: hidden; background: #FFFDFA; }
    @media (prefers-color-scheme: dark) {
      html, body, #root { background: #0C0C0C; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
