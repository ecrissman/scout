<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Scout — The Patch</title>
  <!--
    CONCEPT 2: THE PATCH
    Merit badge circle format. This is the most "sewn-on" of the four concepts.
    The outermost ring is a thick ink band (like a badge border).
    Inside: a compass bezel ring with 16 tick marks (cardinal + intercardinal + halves).
    The cardinal ticks are long; intermediates are short.
    North tick is terracotta and doubles as the longest mark.
    Inside the bezel: a square viewfinder frame with four L-brackets.
    At dead center: a compass needle (north=terracotta, south=ink).
    The whole thing reads as: this is a patch you'd earn.
    Text ring at bottom: "PHOTO · A · DAY" in the ink band.
  -->

  <defs>
    <!-- Grain for sage inner fill -->
    <filter id="g2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4"
                    stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="200" height="200" fill="#F5F1EB"/>

  <!-- ─────────────────────────────────────────
       OUTER BAND — ink filled ring
       r=92 outer, r=76 inner
  ───────────────────────────────────────── -->
  <circle cx="100" cy="100" r="92" fill="#1C1916"/>
  <circle cx="100" cy="100" r="76" fill="#F5F1EB"/>

  <!-- ─────────────────────────────────────────
       TEXT IN THE BAND
       "SCOUT" arced along top half
       "PHOTO · A · DAY" arced along bottom half
  ───────────────────────────────────────── -->
  <path id="topRing"
        d="M 100,100 m -83,0 a 83,83 0 1,1 166,0" fill="none"/>
  <text font-family="Inconsolata, monospace" font-size="13"
        font-weight="800" fill="#F5F1EB" letter-spacing="6.5">
    <textPath href="#topRing" startOffset="15%">S C O U T</textPath>
  </text>

  <path id="botRing"
        d="M 100,100 m -83,0 a 83,83 0 0,0 166,0" fill="none"/>
  <text font-family="Inconsolata, monospace" font-size="9.5"
        font-weight="700" fill="#F5F1EB" letter-spacing="3">
    <textPath href="#botRing" startOffset="50%" text-anchor="middle">PHOTO · A · DAY</textPath>
  </text>

  <!-- ─────────────────────────────────────────
       INNER BADGE FIELD — paper circle
       Separated from the band by the inner ring stroke
  ───────────────────────────────────────── -->
  <circle cx="100" cy="100" r="74" fill="#F5F1EB" stroke="#1C1916" stroke-width="1.5"/>

  <!-- ─────────────────────────────────────────
       COMPASS BEZEL — 16 tick marks on a ring at r=68
       4 cardinal ticks: 9px long, 2.5px wide
       4 intercardinal ticks: 5px long, 1.5px wide
       8 half-intercardinal ticks: 3px long, 1px wide
       North tick: terracotta, 12px long
  ───────────────────────────────────────── -->

  <!-- Cardinal ticks — N, E, S, W -->
  <!-- NORTH — terracotta, longest -->
  <line x1="100" y1="33" x2="100" y2="46"
        stroke="#C4622D" stroke-width="3" stroke-linecap="square"/>
  <!-- SOUTH -->
  <line x1="100" y1="154" x2="100" y2="167"
        stroke="#1C1916" stroke-width="2.5" stroke-linecap="square"/>
  <!-- EAST -->
  <line x1="154" y1="100" x2="167" y2="100"
        stroke="#1C1916" stroke-width="2.5" stroke-linecap="square"/>
  <!-- WEST -->
  <line x1="33" y1="100" x2="46" y2="100"
        stroke="#1C1916" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Intercardinal ticks — NE, SE, SW, NW at 45° (r=68 circle) -->
  <!-- NE: center at (148.1, 51.9), angle 45° -->
  <line x1="145" y1="55" x2="140" y2="60"
        stroke="#1C1916" stroke-width="1.5" stroke-linecap="square"/>
  <!-- SE -->
  <line x1="145" y1="145" x2="140" y2="140"
        stroke="#1C1916" stroke-width="1.5" stroke-linecap="square"/>
  <!-- SW -->
  <line x1="55" y1="145" x2="60" y2="140"
        stroke="#1C1916" stroke-width="1.5" stroke-linecap="square"/>
  <!-- NW -->
  <line x1="55" y1="55" x2="60" y2="60"
        stroke="#1C1916" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Half-intercardinal ticks — 8 more at 22.5° intervals -->
  <!-- NNE (22.5°) approx (125.9, 38.2) direction -->
  <line x1="126" y1="38" x2="124" y2="43"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- ENE (67.5°) approx (161.8, 74.1) -->
  <line x1="162" y1="74" x2="157" y2="76"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- ESE (112.5°) approx (161.8, 125.9) -->
  <line x1="162" y1="126" x2="157" y2="124"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- SSE (157.5°) approx (125.9, 161.8) -->
  <line x1="126" y1="162" x2="124" y2="157"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- SSW (202.5°) approx (74.1, 161.8) -->
  <line x1="74" y1="162" x2="76" y2="157"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- WSW (247.5°) approx (38.2, 125.9) -->
  <line x1="38" y1="126" x2="43" y2="124"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- WNW (292.5°) approx (38.2, 74.1) -->
  <line x1="38" y1="74" x2="43" y2="76"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- NNW (337.5°) approx (74.1, 38.2) -->
  <line x1="74" y1="38" x2="76" y2="43"
        stroke="#1C1916" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- ─────────────────────────────────────────
       VIEWFINDER BRACKETS — inside the bezel
       Four L-corners at the inner square.
       Square is 74×74 centered at 100,100 → corners at 63,63 and 137,137.
       Arm length 18px. Stroke 3.5px square cap.
  ───────────────────────────────────────── -->

  <!-- NW -->
  <path d="M 63 82 L 63 63 L 82 63"
        stroke="#1C1916" stroke-width="3.5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- NE -->
  <path d="M 118 63 L 137 63 L 137 82"
        stroke="#1C1916" stroke-width="3.5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- SW -->
  <path d="M 63 118 L 63 137 L 82 137"
        stroke="#1C1916" stroke-width="3.5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- SE -->
  <path d="M 118 137 L 137 137 L 137 118"
        stroke="#1C1916" stroke-width="3.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- ─────────────────────────────────────────
       COMPASS NEEDLE — hero element at center
       North blade: terracotta, elongated diamond pointing up
       South blade: ink, shorter diamond pointing down
       Classic two-tone compass needle look.
  ───────────────────────────────────────── -->

  <!-- North blade — terracotta -->
  <polygon points="100,68  105.5,99  100,95  94.5,99"
           fill="#C4622D" stroke="#1C1916" stroke-width="1.5"
           stroke-linejoin="round"/>

  <!-- South blade — ink -->
  <polygon points="100,132  105.5,101  100,105  94.5,101"
           fill="#1C1916" stroke="#1C1916" stroke-width="1.5"
           stroke-linejoin="round"/>

  <!-- Needle pivot — double ring -->
  <circle cx="100" cy="100" r="8.5"
          fill="#F5F1EB" stroke="#1C1916" stroke-width="2"/>
  <circle cx="100" cy="100" r="3"
          fill="#1C1916"/>

</svg>
