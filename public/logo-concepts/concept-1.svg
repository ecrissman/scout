<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Scout — The Bearing</title>
  <!--
    CONCEPT 1: THE BEARING
    The simplest, most stamp-ready mark.
    Four viewfinder brackets on paper. The top-center bracket arm
    extends upward and terminates in a solid arrowhead — the north bearing.
    That arrow is the only terracotta element. Everything else is ink.
    No fills inside the frame. Negative space does the work.
    Reads clearly at 16px. Could be a rubber stamp, a wax seal, a favicon.
  -->

  <!-- Paper background -->
  <rect width="200" height="200" fill="#F5F1EB"/>

  <!-- ─────────────────────────────────────────
       VIEWFINDER BRACKETS
       Four L-corners. Arm length ~40px. Stroke 5.5px.
       Square linecap/linejoin for that stencil-cut feel.
       Brackets sit well inside the 200×200 frame (inset 28px).
  ───────────────────────────────────────── -->

  <!-- NW bracket -->
  <path d="M 28 70 L 28 28 L 70 28"
        stroke="#1C1916" stroke-width="5.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- NE bracket -->
  <path d="M 130 28 L 172 28 L 172 70"
        stroke="#1C1916" stroke-width="5.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- SW bracket -->
  <path d="M 28 130 L 28 172 L 70 172"
        stroke="#1C1916" stroke-width="5.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- SE bracket -->
  <path d="M 130 172 L 172 172 L 172 130"
        stroke="#1C1916" stroke-width="5.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- ─────────────────────────────────────────
       NORTH ARROW
       Shaft rises from top-center of the viewfinder frame.
       Anchors at the midpoint of the top edge (y=28),
       climbs to y=8, then an arrowhead above.
       The shaft is ink. The arrowhead fill is terracotta.
       A small cross-tick at the base of the shaft marks
       where frame meets direction — like a bearing indicator.
  ───────────────────────────────────────── -->

  <!-- Shaft — ink, consistent 3px weight -->
  <line x1="100" y1="28" x2="100" y2="10"
        stroke="#1C1916" stroke-width="3"
        stroke-linecap="butt"/>

  <!-- Arrowhead — terracotta solid triangle -->
  <polygon points="100,2 91,14 109,14"
           fill="#C4622D" stroke="#1C1916" stroke-width="1.5"
           stroke-linejoin="round"/>

  <!-- Base tick — short horizontal bar where shaft meets frame -->
  <line x1="93" y1="28" x2="107" y2="28"
        stroke="#1C1916" stroke-width="3"
        stroke-linecap="square"/>

  <!-- ─────────────────────────────────────────
       CENTER CROSSHAIR
       Fine dashed lines meeting at 100,100.
       Broken in the center so a small aperture circle
       floats there. This is the focus point / compass pivot.
  ───────────────────────────────────────── -->

  <!-- Left crosshair arm -->
  <line x1="42" y1="100" x2="87" y2="100"
        stroke="#1C1916" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2 5" opacity="0.35"/>

  <!-- Right crosshair arm -->
  <line x1="113" y1="100" x2="158" y2="100"
        stroke="#1C1916" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2 5" opacity="0.35"/>

  <!-- Top crosshair arm -->
  <line x1="100" y1="42" x2="100" y2="87"
        stroke="#1C1916" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2 5" opacity="0.35"/>

  <!-- Bottom crosshair arm -->
  <line x1="100" y1="113" x2="100" y2="158"
        stroke="#1C1916" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2 5" opacity="0.35"/>

  <!-- Aperture circle at center -->
  <circle cx="100" cy="100" r="9"
          fill="#F5F1EB" stroke="#1C1916" stroke-width="2.5"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="2.5" fill="#1C1916"/>

</svg>
