<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Scout — The Bearing</title>

  <!-- Paper background -->
  <rect width="200" height="200" fill="#F5F1EB"/>

  <!-- Grain texture filter -->
  <defs>
    <filter id="grain1" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       VIEWFINDER BRACKETS — four corners
       Each bracket is an L-shape, thick 5px stroke
       NW, NE, SW corners = ink
       SE corner = terracotta (the "bearing" / north marker accent)
  ═══════════════════════════════════════ -->

  <!-- NW bracket -->
  <path d="M 30 62 L 30 30 L 62 30" stroke="#1C1916" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- NE bracket -->
  <path d="M 138 30 L 170 30 L 170 62" stroke="#1C1916" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- SW bracket -->
  <path d="M 30 138 L 30 170 L 62 170" stroke="#1C1916" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- SE bracket — terracotta accent = the compass bearing / north nod -->
  <path d="M 138 170 L 170 170 L 170 138" stroke="#C4622D" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- ══════════════════════════════════════
       COMPASS ROSE — center of frame
       Four cardinal points: N, E, S, W
       Diamond/arrow shapes, bold
  ═══════════════════════════════════════ -->

  <!-- North pointer — terracotta filled, pointing up -->
  <polygon points="100,54  107,93  100,86  93,93" fill="#C4622D" stroke="#1C1916" stroke-width="2" stroke-linejoin="round"/>

  <!-- South pointer — ink filled, pointing down -->
  <polygon points="100,146  107,107  100,114  93,107" fill="#1C1916" stroke="#1C1916" stroke-width="2" stroke-linejoin="round"/>

  <!-- West pointer — warm-mid filled, pointing left -->
  <polygon points="54,100  93,107  86,100  93,93" fill="#8C857C" stroke="#1C1916" stroke-width="2" stroke-linejoin="round"/>

  <!-- East pointer — warm-mid filled, pointing right -->
  <polygon points="146,100  107,107  114,100  107,93" fill="#8C857C" stroke="#1C1916" stroke-width="2" stroke-linejoin="round"/>

  <!-- Center aperture ring — outer -->
  <circle cx="100" cy="100" r="13" fill="#F5F1EB" stroke="#1C1916" stroke-width="3"/>
  <!-- Center aperture ring — inner dot -->
  <circle cx="100" cy="100" r="4.5" fill="#1C1916"/>

  <!-- ══════════════════════════════════════
       TICK MARKS — cardinal degree ring
       Subtle small ticks around the frame interior
  ═══════════════════════════════════════ -->
  <!-- N tick above north pointer -->
  <line x1="100" y1="42" x2="100" y2="48" stroke="#1C1916" stroke-width="2.5" stroke-linecap="round"/>
  <!-- S tick below south pointer -->
  <line x1="100" y1="152" x2="100" y2="158" stroke="#1C1916" stroke-width="2.5" stroke-linecap="round"/>
  <!-- W tick left of west pointer -->
  <line x1="42" y1="100" x2="48" y2="100" stroke="#1C1916" stroke-width="2.5" stroke-linecap="round"/>
  <!-- E tick right of east pointer -->
  <line x1="152" y1="100" x2="158" y2="100" stroke="#1C1916" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       N LABEL — small cap letterform, hand-drawn feel
       Positioned above the north tick mark
  ═══════════════════════════════════════ -->
  <text x="100" y="39" text-anchor="middle" font-family="Inconsolata, monospace" font-size="11" font-weight="800" fill="#C4622D" letter-spacing="0">N</text>

</svg>
