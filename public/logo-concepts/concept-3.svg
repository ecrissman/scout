<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Scout — True North</title>

  <!-- Paper background -->
  <rect width="200" height="200" fill="#F5F1EB"/>

  <defs>
    <filter id="grain3" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       OUTER FRAME — heavy worn square
       Thick ink border, slightly uneven feel via
       variable stroke on each side
  ═══════════════════════════════════════ -->
  <!-- The frame itself — slightly inset from edge -->
  <rect x="22" y="22" width="156" height="156" rx="4" ry="4"
        fill="#1C1916" stroke="#1C1916" stroke-width="1"/>
  <!-- Inner paper window -->
  <rect x="30" y="30" width="140" height="140" rx="2" ry="2" fill="#F5F1EB"/>

  <!-- ══════════════════════════════════════
       CORNER NOTCHES — viewfinder L-brackets
       Cut into the ink frame border
       These make the frame read as a viewfinder
  ═══════════════════════════════════════ -->
  <!-- NW notch corner accent — paper showing through as L-shape gap -->
  <path d="M 22 22 L 22 46 L 30 46 L 30 30 L 46 30 L 46 22 Z" fill="#F5F1EB"/>
  <!-- NE notch -->
  <path d="M 178 22 L 154 22 L 154 30 L 170 30 L 170 46 L 178 46 Z" fill="#F5F1EB"/>
  <!-- SW notch -->
  <path d="M 22 178 L 22 154 L 30 154 L 30 170 L 46 170 L 46 178 Z" fill="#F5F1EB"/>
  <!-- SE notch — terracotta tint instead of paper = the bearing -->
  <path d="M 178 178 L 154 178 L 154 170 L 170 170 L 170 154 L 178 154 Z" fill="#C4622D"/>

  <!-- ══════════════════════════════════════
       COMPASS NEEDLE — doubles as shutter crosshair
       The big hero element inside the frame
       North half: terracotta
       South half: ink
       Fine tick marks on the frame edges
  ═══════════════════════════════════════ -->

  <!-- Needle NORTH — terracotta elongated diamond pointing up -->
  <!-- North blade -->
  <polygon points="100,46  108,100  100,95  92,100" fill="#C4622D" stroke="#1C1916" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Needle SOUTH — ink elongated diamond pointing down -->
  <polygon points="100,154  108,100  100,105  92,100" fill="#1C1916" stroke="#1C1916" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Horizontal crosshair bars — thin, subtle -->
  <line x1="34" y1="100" x2="84" y2="100" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="116" y1="100" x2="166" y2="100" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- ══════════════════════════════════════
       CENTER APERTURE
       Double circle — lens opening / pivot of needle
  ═══════════════════════════════════════ -->
  <circle cx="100" cy="100" r="14" fill="#F5F1EB" stroke="#1C1916" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="7" fill="none" stroke="#1C1916" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="2.5" fill="#1C1916"/>

  <!-- ══════════════════════════════════════
       CARDINAL TICK MARKS on inner frame edge
       8 ticks total: N, NE, E, SE, S, SW, W, NW
       N and S on vertical axis, terracotta N
  ═══════════════════════════════════════ -->
  <!-- N -->
  <line x1="100" y1="32" x2="100" y2="40" stroke="#C4622D" stroke-width="3" stroke-linecap="round"/>
  <!-- S -->
  <line x1="100" y1="160" x2="100" y2="168" stroke="#1C1916" stroke-width="2" stroke-linecap="round"/>
  <!-- E -->
  <line x1="160" y1="100" x2="168" y2="100" stroke="#1C1916" stroke-width="2" stroke-linecap="round"/>
  <!-- W -->
  <line x1="32" y1="100" x2="40" y2="100" stroke="#1C1916" stroke-width="2" stroke-linecap="round"/>
  <!-- NE (diagonal intercardinal) -->
  <line x1="149" y1="51" x2="145" y2="57" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- NW -->
  <line x1="51" y1="51" x2="55" y2="57" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- SE -->
  <line x1="149" y1="149" x2="145" y2="143" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- SW -->
  <line x1="51" y1="149" x2="55" y2="143" stroke="#1C1916" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ══════════════════════════════════════
       "N" LETTERFORM at top tick
       Terracotta — the mark of north
  ═══════════════════════════════════════ -->
  <text x="100" y="30" text-anchor="middle"
        font-family="Inconsolata, monospace"
        font-size="10" font-weight="900"
        fill="#C4622D" letter-spacing="0">N</text>

  <!-- ══════════════════════════════════════
       CORNER BRACKET REDRAWN as ink strokes
       Over the notched corners — tight L-marks
  ═══════════════════════════════════════ -->
  <!-- NW -->
  <path d="M 34 52 L 34 34 L 52 34" stroke="#1C1916" stroke-width="3" stroke-linecap="square"/>
  <!-- NE -->
  <path d="M 148 34 L 166 34 L 166 52" stroke="#1C1916" stroke-width="3" stroke-linecap="square"/>
  <!-- SW -->
  <path d="M 34 148 L 34 166 L 52 166" stroke="#1C1916" stroke-width="3" stroke-linecap="square"/>
  <!-- SE — terracotta -->
  <path d="M 148 166 L 166 166 L 166 148" stroke="#C4622D" stroke-width="3" stroke-linecap="square"/>

</svg>
