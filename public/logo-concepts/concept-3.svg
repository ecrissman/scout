<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Scout — True North</title>
  <!--
    CONCEPT 3: TRUE NORTH
    The most reduced, most tattooed concept. Not about badges or patches —
    about mark-making. A single rectangular viewfinder frame (full sides,
    not corner-brackets — more like a camera body outline) with notched
    corners that create the bracket feel. Through the center: ONE bold
    north arrow, running full vertical height of the frame, tip emerging
    above it. The arrow IS the compass. The frame IS the viewfinder.
    They share one axis. That's the whole idea.
    Colors: ink frame, terracotta arrowhead tip only.
    Works as a favicon, a rubber stamp, a chest tattoo.
  -->

  <!-- Paper background -->
  <rect width="200" height="200" fill="#F5F1EB"/>

  <!-- ─────────────────────────────────────────
       VIEWFINDER FRAME
       Full rectangular border — not just brackets.
       But the corners are NOTCHED (cutaway squares),
       so it reads as four L-brackets joined into a frame.
       Outer rect: 42,42 to 158,158 (116×116).
       Notch size: 18×18 at each corner.
       Border width: 5px.

       Technique: draw the frame as a compound path with
       corner cutouts — a rect with square notches at corners.
  ───────────────────────────────────────── -->

  <!-- Frame shape: outer rect with notched corners.
       Path goes clockwise from top-left notch end. -->
  <path d="
    M 60,42
    L 140,42
    L 140,42
    L 158,42
    L 158,60
    L 158,140
    L 158,158
    L 140,158
    L 60,158
    L 42,158
    L 42,140
    L 42,60
    Z"
    fill="none" stroke="#1C1916" stroke-width="5"
    stroke-linecap="butt" stroke-linejoin="miter"/>

  <!--
    The notches: cutaway white squares at each corner.
    Cover the stroked corners with paper-colored rectangles
    to create the bracket gap.
  -->
  <!-- NW notch -->
  <rect x="40" y="40" width="20" height="20" fill="#F5F1EB"/>
  <!-- NE notch -->
  <rect x="140" y="40" width="20" height="20" fill="#F5F1EB"/>
  <!-- SW notch -->
  <rect x="40" y="140" width="20" height="20" fill="#F5F1EB"/>
  <!-- SE notch -->
  <rect x="140" y="140" width="20" height="20" fill="#F5F1EB"/>

  <!-- Now redraw the bracket L-corners over the notches
       so they read as proper thick L-shapes.
       Arm length: 22px. Stroke-width 5 (same as frame).
  -->
  <!-- NW bracket -->
  <path d="M 42 64 L 42 42 L 64 42"
        stroke="#1C1916" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- NE bracket -->
  <path d="M 136 42 L 158 42 L 158 64"
        stroke="#1C1916" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- SW bracket -->
  <path d="M 42 136 L 42 158 L 64 158"
        stroke="#1C1916" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- SE bracket -->
  <path d="M 136 158 L 158 158 L 158 136"
        stroke="#1C1916" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- ─────────────────────────────────────────
       THE NORTH ARROW
       Vertical axis runs from bottom of frame (y=158)
       to above the frame (y=10).
       This is a bold element — 4px shaft, large arrowhead.
       Terracotta arrowhead. Ink shaft.
       A notch is cut in the south end of the shaft where
       it meets the frame bottom — a small forked tail,
       distinguishing which end is the pointer.
  ───────────────────────────────────────── -->

  <!-- Arrow shaft — full vertical, ink -->
  <line x1="100" y1="158" x2="100" y2="24"
        stroke="#1C1916" stroke-width="3.5"
        stroke-linecap="butt"/>

  <!-- Arrowhead — terracotta, solid, large -->
  <polygon points="100,10 89,26 111,26"
           fill="#C4622D" stroke="#1C1916" stroke-width="2"
           stroke-linejoin="round"/>

  <!-- South-end fork — two small prongs at base of shaft -->
  <!-- Left prong -->
  <line x1="100" y1="158" x2="92" y2="168"
        stroke="#1C1916" stroke-width="3"
        stroke-linecap="round"/>
  <!-- Right prong -->
  <line x1="100" y1="158" x2="108" y2="168"
        stroke="#1C1916" stroke-width="3"
        stroke-linecap="round"/>

  <!-- ─────────────────────────────────────────
       HORIZONTAL CROSSHAIR
       A single thin horizontal line through center —
       the viewfinder focus line, perpendicular to the arrow.
       Breaks near center to float the pivot circle.
  ───────────────────────────────────────── -->

  <!-- Left arm -->
  <line x1="44" y1="100" x2="89" y2="100"
        stroke="#1C1916" stroke-width="2"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Right arm -->
  <line x1="111" y1="100" x2="156" y2="100"
        stroke="#1C1916" stroke-width="2"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Pivot / aperture at crossing -->
  <circle cx="100" cy="100" r="8"
          fill="#F5F1EB" stroke="#1C1916" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="2.5" fill="#1C1916"/>

</svg>
