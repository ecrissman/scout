name = "scout"
compatibility_date = "2024-09-02"
pages_build_output_dir = "dist"

[vars]
SUPABASE_URL = "https://lcubjewkgpnqxeoktvgk.supabase.co"

# Secrets — set via `wrangler pages secret put <NAME>`:
#   SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   ANTHROPIC_API_KEY, RESEND_API_KEY, WEBHOOK_SECRET
#
# SUPABASE_URL lives in [vars] (not secrets) because it's a public value
# and putting it here keeps the binding declared in source. An earlier
# attempt to also set it as a secret caused a binding-name collision on
# deploy — if you need to re-add the secret version, remove this [vars]
# entry first.

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "photo-journal"
