<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Card tint</title>
<style></style>
</head>
<body>

<div class="row">
  <div style="flex:1 1 300px;background:var(--s2-paper);padding:20px;border:1px solid var(--s2-bone);border-radius:6px">
    <div class="label" style="margin-bottom:10px">tint — light</div>
    <div style="background:rgba(12,12,12,0.05);border-radius:14px;padding:16px;color:var(--s2-ink)">
      <div class="mono" style="font-size:10px;letter-spacing:.04em">rgba(12,12,12,0.05)</div>
      <div style="font-family:var(--s2-serif);font-size:17px;margin-top:8px">Edge light only.</div>
    </div>
  </div>
  <div style="flex:1 1 300px;background:#0C0C0C;padding:20px;border-radius:6px">
    <div class="label" style="margin-bottom:10px;color:#7A7668">tint — dark</div>
    <div style="background:#22221F;border-radius:14px;padding:16px;color:#FFFDFA">
      <div class="mono" style="font-size:10px;letter-spacing:.04em;color:#B8B2A3">#22221F</div>
      <div style="font-family:var(--s2-serif);font-size:17px;margin-top:8px">Edge light only.</div>
    </div>
  </div>
</div>
<div style="margin-top:14px;font-family:var(--s2-serif);font-size:14px;line-height:1.45;color:var(--s2-archive);max-width:600px">
  Cards use a <em>tint</em>, not a pigment — so they sit on the paper instead of introducing a new hue.
</div>

</body>
</html>
