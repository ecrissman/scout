<head>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;text-align:center;color:var(--s2-ink)">

  <div>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin:0 auto"><rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="13.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="3.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="13.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/></svg>
    <div class="label" style="margin-top:8px">archive</div>
  </div>
  <div>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin:0 auto"><rect x="3.5" y="5" width="17" height="15.5" rx="2" stroke="currentColor" stroke-width="1.75"/><path d="M3.5 10h17M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>

  </div>
  <div>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin:0 auto"><path d="M2.5 8.5a6.5 6.5 0 0 1 11.4-4.3M15.5 9.5A6.5 6.5 0 0 1 4.1 13.8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M14.2 1.5v3h-3M3.8 16.5v-3h3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>

</div>
<div style="margin-top:14px;font-family:var(--s2-serif);font-size:14px;color:var(--s2-archive);text-align:center;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.45">
  Stroke 1.75px · round caps · 24×24 viewBox · ink color only · never emoji, never accent.
</div>
