<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Type scale</title>
<style></style>
</head>
<body>

<div style="font-family:var(--s2-mono);font-size:11px">
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-2xs</span><span style="color:var(--s2-smoke)">10</span><span style="font-family:var(--s2-sans);font-size:10px;color:var(--s2-ink)">Micro label</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-xs</span><span style="color:var(--s2-smoke)">12</span><span style="font-family:var(--s2-sans);font-size:12px;color:var(--s2-ink)">Meta copy</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-sm</span><span style="color:var(--s2-smoke)">14</span><span style="font-family:var(--s2-sans);font-size:14px;color:var(--s2-ink)">Link / tip</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-base</span><span style="color:var(--s2-smoke)">16</span><span style="font-family:var(--s2-sans);font-size:16px;color:var(--s2-ink)">Body</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-lg</span><span style="color:var(--s2-smoke)">21</span><span style="font-family:var(--s2-serif);font-size:21px;color:var(--s2-ink)">Subhead</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--s2-bone)"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-2xl</span><span style="color:var(--s2-smoke)">30</span><span style="font-family:var(--s2-serif);font-size:30px;color:var(--s2-ink);letter-spacing:-.015em">Brief body</span></div>
  <div style="display:grid;grid-template-columns:70px 60px 1fr;gap:12px;align-items:baseline;padding:8px 0"><span style="color:var(--s2-smoke);letter-spacing:.08em">--fs-3xl</span><span style="color:var(--s2-smoke)">36</span><span style="font-family:var(--s2-serif);font-size:36px;color:var(--s2-ink);letter-spacing:-.02em">Filed.</span></div>
</div>

</body>
</html>
