<div class="col" style="gap:18px">

      <div style="padding:7px 14px;font-family:var(--s2-sans);font-size:13px;color:var(--s2-ink)">1 hr</div>
      <div style="padding:7px 14px;font-family:var(--s2-sans);font-size:13px;color:var(--s2-ink)">3 hr</div>
