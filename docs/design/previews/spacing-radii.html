<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Radii</title>
<style></style>
</head>
<body>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;font-family:var(--s2-mono);font-size:10px">
  <div style="text-align:center">
    <div style="background:var(--s2-tint-light);height:72px;border-radius:2px;margin-bottom:8px"></div>
    <div style="color:var(--s2-smoke);letter-spacing:.08em">2px</div>
    <div style="color:var(--s2-ink);margin-top:2px">photo · stamp</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--s2-tint-light);height:72px;border-radius:9px;margin-bottom:8px"></div>
    <div style="color:var(--s2-smoke);letter-spacing:.08em">9–10px</div>
    <div style="color:var(--s2-ink);margin-top:2px">segmented</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--s2-tint-light);height:72px;border-radius:12px;margin-bottom:8px"></div>
    <div style="color:var(--s2-smoke);letter-spacing:.08em">12px</div>
    <div style="color:var(--s2-ink);margin-top:2px">button</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--s2-tint-light);height:72px;border-radius:14px;margin-bottom:8px"></div>
    <div style="color:var(--s2-smoke);letter-spacing:.08em">14px</div>
    <div style="color:var(--s2-ink);margin-top:2px">card</div>
  </div>
</div>
<div style="margin-top:14px;font-family:var(--s2-serif);font-size:14px;color:var(--s2-archive);line-height:1.4">
  Pills use <span class="mono" style="color:var(--s2-ink);font-size:12px">999px</span>. Photos are deliberately sharp.
</div>

</body>
</html>
