<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Paper and Ink</title>
<style></style>
</head>
<body>

<div class="row">
  <div class="chip" style="background:#FFFDFA;border:1px solid var(--s2-bone);color:var(--s2-ink);flex:1 1 140px">
    <div class="hex">#FFFDFA</div><div class="role">paper</div>
  </div>
  <div class="chip" style="background:#F7F3EC;color:var(--s2-ink);flex:1 1 140px">
    <div class="hex">#F7F3EC</div><div class="role">paper-2</div>
  </div>
  <div class="chip" style="background:#F2F1EC;color:var(--s2-ink);flex:1 1 140px">
    <div class="hex">#F2F1EC</div><div class="role">grouped-bg</div>
  </div>
  <div class="chip" style="background:#0C0C0C;color:#FFFDFA;flex:1 1 140px">
    <div class="hex">#0C0C0C</div><div class="role">ink</div>
  </div>
  <div class="chip" style="background:#3A3A35;color:#FFFDFA;flex:1 1 140px">
    <div class="hex">#3A3A35</div><div class="role">archive</div>
  </div>
  <div class="chip" style="background:#8A8680;color:#FFFDFA;flex:1 1 140px">
    <div class="hex">#8A8680</div><div class="role">smoke</div>
  </div>
  <div class="chip" style="background:#D8D7D4;color:var(--s2-ink);flex:1 1 140px">
    <div class="hex">#D8D7D4</div><div class="role">bone</div>
  </div>
</div>

</body>
</html>
