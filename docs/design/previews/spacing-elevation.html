<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Elevation and shadows</title>
<style></style>
</head>
<body>

<div class="col" style="gap:16px">
  <div>
    <div class="label" style="margin-bottom:10px">none — default</div>
    <div style="display:flex;gap:10px">
      <div style="background:var(--s2-tint-light);padding:14px 18px;border-radius:14px;min-width:160px;font-family:var(--s2-serif);font-size:15px">Angle card</div>
      <div style="background:var(--s2-paper);border:1px solid var(--s2-bone);padding:14px 18px;border-radius:6px;min-width:160px;font-family:var(--s2-mono);font-size:11px;color:var(--s2-smoke);letter-spacing:.14em;text-transform:uppercase">hairline rule</div>
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:10px">0 3 8 rgba(0,0,0,.08) — selected segmented chip only</div>
    <div style="background:rgba(120,120,128,0.12);padding:2px;border-radius:9px;display:inline-flex;gap:0">
      <div style="padding:7px 16px;font-family:var(--s2-sans);font-size:13px;font-weight:500;background:var(--s2-paper);box-shadow:0 3px 8px rgba(0,0,0,.08);border-radius:7px">Off</div>
      <div style="padding:7px 16px;font-family:var(--s2-sans);font-size:13px;color:var(--s2-ink)">3 min</div>
      <div style="padding:7px 16px;font-family:var(--s2-sans);font-size:13px;color:var(--s2-ink)">15 min</div>
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:10px">0 6 20 rgba(0,0,0,.08) — tab bar pill only</div>
    <div style="display:inline-flex;background:var(--s2-paper);border:1px solid var(--s2-bone);border-radius:999px;padding:6px;gap:6px;box-shadow:0 6px 20px rgba(0,0,0,.08)">
      <div style="width:52px;height:44px;border-radius:999px;background:var(--s2-ink)"></div>
      <div style="width:52px;height:44px;border-radius:999px"></div>
      <div style="width:52px;height:44px;border-radius:999px"></div>
    </div>
  </div>
</div>

</body>
</html>
