<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Angle and Context cards</title>
<style></style>
</head>
<body>

<div class="col" style="gap:14px">
  <div style="background:var(--s2-tint-light);border-radius:14px;padding:16px 18px;max-width:480px">
    <div class="label" style="margin-bottom:8px">angle</div>
    <div style="font-family:var(--s2-serif);font-weight:500;font-size:19px;line-height:1.2;letter-spacing:-.01em;margin-bottom:10px">Edge light only.</div>
    <div style="display:flex;gap:18px;align-items:center">
      <span style="font-family:var(--s2-sans);font-size:13px;font-weight:500;color:#007C04">↻ Try another</span>
      <span style="font-family:var(--s2-sans);font-size:13px;color:var(--s2-smoke)">Skip</span>
    </div>
  </div>
  <div style="background:var(--s2-tint-light);border-radius:14px;padding:16px 18px;max-width:480px">
    <div class="label" style="margin-bottom:8px">context</div>
    <div style="font-family:var(--s2-serif);font-size:15px;line-height:1.5;color:var(--s2-ink);margin-bottom:6px">Overcast · Capitol Hill · 8:17</div>
    <div style="font-family:var(--s2-mono);font-size:11px;color:var(--s2-smoke);letter-spacing:.1em;text-transform:uppercase">auto-detected · tap to edit</div>
  </div>
</div>

</body>
</html>
