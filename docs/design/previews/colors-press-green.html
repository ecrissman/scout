<html lang="en">
<head>

<link rel="stylesheet" href="_card.css" />
<title>Press Green</title>
<style></style>
</head>
<body>

<div class="row">
  <div class="chip" style="background:#007C04;color:#FFFDFA;flex:3 1 280px">
    <div class="hex">#007C04</div><div class="role">press green — the only accent</div>
  </div>
  <div class="chip" style="background:#F2F7F0;color:var(--s2-ink);flex:1 1 100px"><div class="hex">#F2F7F0</div><div class="role">50</div></div>
  <div class="chip" style="background:#E0ECDE;color:var(--s2-ink);flex:1 1 100px"><div class="hex">#E0ECDE</div><div class="role">100</div></div>
  <div class="chip" style="background:#B8D4B2;color:var(--s2-ink);flex:1 1 100px"><div class="hex">#B8D4B2</div><div class="role">200</div></div>
  <div class="chip" style="background:#7FA876;color:#FFFDFA;flex:1 1 100px"><div class="hex">#7FA876</div><div class="role">300</div></div>
  <div class="chip" style="background:#005A03;color:#FFFDFA;flex:1 1 100px"><div class="hex">#005A03</div><div class="role">700</div></div>
  <div class="chip" style="background:#00330A;color:#FFFDFA;flex:1 1 100px"><div class="hex">#00330A</div><div class="role">900</div></div>
</div>
<div style="margin-top:16px;font-family:var(--s2-serif);font-size:15px;line-height:1.45;color:var(--s2-archive);max-width:540px">
  Appears <em>only</em> at earned moments. Active timer. New Assignment stamp. Editor note ready. Never on nav, chrome, or decoration.
</div>
