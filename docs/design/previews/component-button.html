<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Primary button</title>
</head>
<body>

<div class="col" style="gap:16px">
  <div>
    <div class="label" style="margin-bottom:8px">default — sf pro 17 · 500</div>
    <button style="display:block;padding:15px 24px;background:var(--s2-ink);color:var(--s2-paper);border:none;border-radius:12px;font-family:var(--s2-sans);font-size:17px;font-weight:500;letter-spacing:-0.01em;cursor:pointer;min-width:280px">Compose brief</button>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px">:active — opacity 0.75, 150ms</div>
    <button style="display:block;padding:15px 24px;background:var(--s2-ink);color:var(--s2-paper);border:none;border-radius:12px;font-family:var(--s2-sans);font-size:17px;font-weight:500;letter-spacing:-0.01em;opacity:.75;min-width:280px">File this one</button>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px">disabled</div>
    <button disabled style="display:block;padding:15px 24px;background:var(--s2-ink);color:var(--s2-paper);border:none;border-radius:12px;font-family:var(--s2-sans);font-size:17px;font-weight:500;letter-spacing:-0.01em;opacity:.35;min-width:280px">Compose</button>
  </div>
</div>

</body>
</html>
