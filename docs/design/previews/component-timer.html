<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Timer card</title>
<style></style>
</head>
<body>

<div style="background:var(--s2-tint-light);border-radius:14px;padding:14px 18px;max-width:420px">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
    <span style="font-family:var(--s2-mono);font-size:11px;font-weight:500;color:#007C04;letter-spacing:.14em;text-transform:uppercase">Time Box</span>
    <span style="font-family:var(--s2-mono);font-size:11px;color:var(--s2-smoke)">expires 9:57 PM</span>
  </div>
  <div style="font-family:var(--s2-sans);font-weight:300;font-size:40px;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;color:var(--s2-ink)">11 : 52</div>
  <div style="height:3px;background:rgba(140,133,124,0.2);border-radius:2px;overflow:hidden;margin-top:10px"><div style="height:100%;width:38%;background:#007C04"></div></div>
</div>

</body>
</html>
