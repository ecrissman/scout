<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Tab bar</title>
<style></style>
</head>
<body>

<div style="display:flex;justify-content:center;padding:20px 0">
  <div style="display:inline-flex;background:var(--s2-paper);border:1px solid var(--s2-bone);border-radius:999px;padding:6px;gap:6px;box-shadow:0 6px 20px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,.04)">
    <div style="width:52px;height:44px;border-radius:999px;background:var(--s2-ink);display:flex;align-items:center;justify-content:center;color:var(--s2-paper)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1M18.7 18.7l-2.1-2.1M7.4 7.4L5.3 5.3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
    </div>
    <div style="width:52px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--s2-smoke)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="13.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="3.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/><rect x="13.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.75"/></svg>
    </div>
    <div style="width:52px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--s2-smoke)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="15.5" rx="2" stroke="currentColor" stroke-width="1.75"/><path d="M3.5 10h17M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
    </div>
  </div>
</div>
<div style="margin-top:6px;font-family:var(--s2-serif);font-size:14px;line-height:1.45;color:var(--s2-archive);text-align:center">
  Floating pill · 3 icon-only tabs · Active is <em>ink</em>, never press green.
</div>
