<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=700" />
<link rel="stylesheet" href="_card.css" />
<title>Mood pills</title>
<style></style>
</head>
<body>

<div class="col" style="gap:16px">
  <div>
    <div class="label" style="margin-bottom:10px">horizontal scroll · snap-x · 20px gutter</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button style="padding:10px 18px;background:var(--s2-ink);color:var(--s2-paper);font-family:var(--s2-sans);font-size:15px;font-weight:500;border:none;border-radius:999px">Restless</button>
      <button style="padding:10px 18px;background:var(--s2-tint-light);color:var(--s2-ink);font-family:var(--s2-sans);font-size:15px;border:none;border-radius:999px">Lovely</button>
      <button style="padding:10px 18px;background:var(--s2-tint-light);color:var(--s2-ink);font-family:var(--s2-sans);font-size:15px;border:none;border-radius:999px">Relaxed</button>
      <button style="padding:10px 18px;background:var(--s2-tint-light);color:var(--s2-ink);font-family:var(--s2-sans);font-size:15px;border:none;border-radius:999px">Pensive</button>
      <button style="padding:10px 18px;background:var(--s2-tint-light);color:var(--s2-ink);font-family:var(--s2-sans);font-size:15px;border:none;border-radius:999px">Stuck</button>
    </div>
  </div>
  <div style="font-family:var(--s2-serif);font-size:14px;line-height:1.45;color:var(--s2-archive);max-width:560px">
    Inactive pills use the card tint. Active flips to ink fill, paper text, weight 500.
  </div>
</div>

</body>
</html>
