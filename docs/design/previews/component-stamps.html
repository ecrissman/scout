<body>

<div class="col" style="gap:18px">
  <div>
    <div class="label" style="margin-bottom:10px">dispatch — geist mono 9 · 0.25em · press green</div>
    <div style="display:flex;gap:10px;align-items:center">
      <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1.5px solid #007C04;color:#007C04;font-family:var(--s2-mono);font-size:9px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;border-radius:2px">
        <span style="width:5px;height:5px;border-radius:999px;background:#007C04"></span>
        New Assignment
      </span>
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:10px">filed — geist mono 11 · 0.3em · press green · rotate -1.5°</div>
    <div style="display:flex;gap:10px">
      <span style="display:inline-block;padding:6px 14px;border:1.5px solid #007C04;color:#007C04;font-family:var(--s2-mono);font-size:11px;font-weight:500;letter-spacing:.30em;text-transform:uppercase;border-radius:2px;transform:rotate(-1.5deg)">Filed</span>
    </div>
  </div>
