<div class="col" style="gap:12px">

    <div class="label" style="margin-bottom:4px">brief</div>
    Edge light only.
  </div>
  <div style="background:var(--s2-tint-light);border-left:2px solid var(--s2-ink);padding:14px 18px;font-family:var(--s2-serif);font-size:17px;line-height:1.4">

  </div>
  <div style="background:var(--s2-tint-light);border-left:2px solid var(--s2-ink);padding:14px 18px;font-family:var(--s2-serif);font-size:17px;line-height:1.4">
