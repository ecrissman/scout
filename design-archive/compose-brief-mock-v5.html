<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scout · Compose Brief (v5 — current brand)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Current Scout tokens (from src/App.jsx) */
    --s2-paper:#FFFDFA;
    --s2-paper-2:#F7F3EC;
    --s2-ink:#0C0C0C;
    --s2-bone:#D8D7D4;
    --s2-smoke:#8A8680;
    --s2-archive:#3A3A35;
    --s2-press-green:#007C04;

    --s2-serif:'Fraunces',Georgia,serif;
    --s2-mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --s2-sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#EFEDE8;font-family:var(--s2-sans);color:var(--s2-ink);-webkit-font-smoothing:antialiased}
  body{padding:32px 16px 80px;display:flex;justify-content:center;flex-wrap:wrap}
  .caption{font-family:var(--s2-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--s2-smoke);text-align:center;margin-bottom:10px}
  .phone{
    width:390px;background:var(--s2-paper);border-radius:28px;
    box-shadow:0 2px 4px rgba(0,0,0,.04),0 20px 60px rgba(0,0,0,.12);
    overflow:hidden;position:relative;
  }
  .status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-family:var(--s2-sans);font-size:15px;font-weight:600}
  .chrome{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 2px}
  .icn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--s2-ink);font-size:18px}
  .hd{padding:10px 20px 24px}
  .title{font-family:var(--s2-serif);font-weight:500;font-size:30px;letter-spacing:-.015em;margin:0;line-height:1.05;color:var(--s2-ink)}
  .dateline{font-family:var(--s2-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--s2-smoke);margin-top:8px}

  .section{padding:0 20px;margin-bottom:22px}
  .lbl{
    font-family:var(--s2-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--s2-smoke);margin-bottom:10px;font-weight:500;
  }

  /* Feeling — native-feel pill scroll */
  .mood-scroll{
    display:flex;gap:8px;overflow-x:auto;padding:2px 20px 4px;margin:0 -20px 4px;
    scroll-snap-type:x mandatory;scrollbar-width:none;
  }
  .mood-scroll::-webkit-scrollbar{display:none}
  .mood-pill{
    flex:0 0 auto;scroll-snap-align:start;padding:10px 18px;
    background:var(--s2-paper-2);border-radius:999px;
    font-family:var(--s2-sans);font-size:15px;color:var(--s2-ink);cursor:pointer;white-space:nowrap;
    transition:background .12s;
  }
  .mood-pill.sel{background:var(--s2-ink);color:var(--s2-paper);font-weight:500}

  /* Angle — soft card, sans (less serif) */
  .angle-card{
    background:var(--s2-paper-2);border-radius:14px;padding:16px;
    display:flex;flex-direction:column;gap:12px;
  }
  .angle-text{
    font-family:var(--s2-sans);font-weight:500;font-size:17px;line-height:1.35;
    letter-spacing:-.005em;color:var(--s2-ink);
  }
  .angle-actions{display:flex;gap:18px;align-items:center}
  .angle-actions a{font-family:var(--s2-sans);font-size:13px;color:var(--s2-smoke);cursor:pointer;text-decoration:none}
  .angle-actions a:first-child{color:var(--s2-press-green);font-weight:500}

  /* Time — segmented iOS-style */
  .seg{
    display:flex;background:var(--s2-paper-2);border-radius:10px;padding:3px;gap:2px;
  }
  .seg div{
    flex:1;text-align:center;padding:9px 0;font-family:var(--s2-sans);font-size:13px;
    color:var(--s2-smoke);border-radius:8px;cursor:pointer;font-weight:500;
  }
  .seg div.sel{background:var(--s2-paper);color:var(--s2-ink);box-shadow:0 1px 2px rgba(0,0,0,.06);font-weight:600}

  /* Context — 2-up cards (from v1), restyled flat */
  .ctx-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ctx-card{
    background:var(--s2-paper-2);border-radius:14px;padding:14px;
    display:flex;flex-direction:column;gap:4px;
  }
  .ctx-card .icon{width:18px;height:18px;color:var(--s2-smoke);margin-bottom:6px}
  .ctx-card .val{
    font-family:var(--s2-sans);font-weight:600;font-size:16px;color:var(--s2-ink);letter-spacing:-.01em;line-height:1.2;
  }
  .ctx-card .sub{
    font-family:var(--s2-mono);font-size:11px;letter-spacing:.04em;color:var(--s2-smoke);
  }

  /* CTA */
  .footer-cta{padding:14px 20px 26px}
  .cta{
    display:block;width:100%;padding:15px;background:var(--s2-ink);color:var(--s2-paper);
    border:none;border-radius:12px;font-family:var(--s2-sans);font-size:15px;font-weight:600;
    letter-spacing:.02em;cursor:pointer;
  }
</style>
</head>
<body>

<div>
  <div class="caption">Compose Brief · v5 · current brand</div>
  <div class="phone">
    <div class="status"><span>9:41</span><span style="font-size:12px">●●● 5G ▮</span></div>

    <div class="chrome">
      <div class="icn">←</div>
      <div class="icn">⋯</div>
    </div>

    <div class="hd">
      <h1 class="title">Daily Brief</h1>
      <div class="dateline">Fri · Apr 17 · №&nbsp;017</div>
    </div>

    <div class="section"><div class="lbl">How are you feeling?</div></div>
    <div class="mood-scroll">
      <div style="flex:0 0 12px"></div>
      <div class="mood-pill sel">Lovely</div>
      <div class="mood-pill">Relaxed</div>
      <div class="mood-pill">Restless</div>
      <div class="mood-pill">Pensive</div>
      <div class="mood-pill">Electric</div>
      <div class="mood-pill">Quiet</div>
      <div class="mood-pill">Curious</div>
      <div style="flex:0 0 12px"></div>
    </div>

    <div style="height:22px"></div>

    <div class="section">
      <div class="lbl">The angle</div>
      <div class="angle-card">
        <div class="angle-text">Edge light only.</div>
        <div class="angle-actions">
          <a>↻ Try another</a>
          <a>Skip</a>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Time Box</div>
      <div class="seg">
        <div class="sel">Off</div>
        <div>15 min</div>
        <div>1 hr</div>
        <div>3 hr</div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Context</div>
      <div class="ctx-row">
        <div class="ctx-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <div class="val">62°F · Clear</div>
          <div class="sub">Gold in 2h 14m</div>
        </div>
        <div class="ctx-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s7-6 7-12a7 7 0 10-14 0c0 6 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg>
          <div class="val">Ballard</div>
          <div class="sub">Seattle, WA</div>
        </div>
      </div>
    </div>

    <div class="footer-cta">
      <button class="cta">Compose Brief</button>
    </div>
  </div>
</div>

</body>
</html>
